<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0px;
            margin: 0px;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(150deg, rgb(95, 131, 227), rgb(95, 131, 227), rgb(95, 131, 227), rgb(98, 209, 250), rgb(98, 209, 250));
        }

        /* card */
        .card {
            width: 500px;
            height: 450px;
            background-color: aliceblue;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px;
            gap: 20px;
        }
        .card>h1{
            color: midnightblue;
        }
        /* result */
        .card button {
            width: 100%;
            padding: 10px 0px;
            background-color: steelblue;
            border-radius: 40px;
            border: 2px solid #295e8b;
            font-size: 20px;
            color: aliceblue;
        }

        /* game */
        .game {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: slategray;
        }

        .game div {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 70px;
        }

        .game h2 {
            font-size: 20px;
        }

        .game h1 {
            font-size: 50px;
            margin-left: 10px;
        }

        /* emoji */
        .game div:first-child h1 {
            font-size: 75px;
            transform: rotateZ(90deg);
        }

        .game div:last-child h1 {
            font-size: 75px;
            transform: rotateZ(-90deg);
        }

        /* roll */
        .roll {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .roll h1 {
            font-size: 50px;
            transform: rotateZ(90deg);
            height: 110px;
            width: 65px;
            border-radius: 40px;
            border: 2px solid slategray;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .roll p {
            color: slategray;
            font-size: 20px;
            margin-top: -15px;
        }
    </style>
</head>

<body>
    <!-- main-div -->
    <div class="card">
        <!-- heading -->
        <h1>Stone✊ Paper🖐 Scissor✌</h1>
        <!-- result -->
        <button id="res">Let's Start</button>
        <!-- game -->
        <div class="game">
            <!-- me -->
            <div>
                <h2>YOU</h2>
                <h1 id="me">✊</h1>
            </div>
            <h1>VS</h1>
            <!-- computer -->
            <div>
                <h2>COMPUTER</h2>
                <h1 id="comp">✌</h1>
            </div>
        </div>
        <!-- ROLL -->
        <div class="roll">
            <div>
                <h1 id="stone" onclick="play('stone')">✊</h1>
                <p>Stone</p>
            </div>
            <div>
                <h1 id="paper" onclick="play('paper')">🖐</h1>
                <p>Paper</p>
            </div>
            <div>
                <h1 id="scissor" onclick="play('scissor')">✌</h1>
                <p>Scissor</p>
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
