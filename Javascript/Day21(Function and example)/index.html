<head>

    <style>
        body{
            height: 500px;
            display: flex;
            justify-content: center;

    <h1>A = <span id="aValue"></span></h1>
    <h1>B = <span id="bValue"></span></h1>

    <div>
        <button onclick="total('add')">Add</button>
        <button onclick="total('sub')">Subtract</button>

    </div>
    <script src="./index.js"></script>

</html>
