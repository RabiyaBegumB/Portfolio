<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
            color: white;
            gap: 50px;
        }

        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            height: 150px;
        }

        form div {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 50px;
        }

        #inp1,
        #inp2 {
            padding: 10px;
            font-size: 25px;
            background-color: black;
            color: white;
            border: none;
            box-shadow: 0px 0px 10px rgb(54, 52, 52);
            outline: none;
        }
        #meth{
             padding: 10px;
            font-size: 25px;
            background-color: black;
            color: white;
            border: none;
            box-shadow: 0px 0px 10px rgb(54, 52, 52);
            outline: none;
            margin-right: 120px;
        }
        form div{
             display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            
        }
        button {
            border: none;
            background-color: black;
            color: white;
            padding: 10px 15px;
            box-shadow: 0px 0px 10px rgb(54, 52, 52);
            border-radius: 5px;
            font-size: 20px;
        }
        body>div{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;
        }
        h1{
            color: goldenrod;
            font-size: 50px;
            margin: 0px;
        }
    </style>
</head>

<body>
    <form>
        <div>
            <label>A : </label>
            <input placeholder="Enter the number" id="inp1" /><br />
        </div>
        <div>
            <label>B : </label>
            <input placeholder="Enter the number" id="inp2" /><br />
        </div>
        <div>
            <label>Method : </label>
            <input placeholder="add / sub / mul / div" id="meth" /><br />
        </div>
        <h1></h1>
    </form>
    <div>
        <h1 id="ans">Answer</h1>
        <button onclick="show()">Submit</button>
    </div>
    <script src="./index.js"></script>
</body>

</html>
