<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM CARD</title>
    <style>
        /* main-div */
        * {
            box-sizing: border-box;
            padding: 0px;
            margin: 0px;
        }

        .main-div {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            perspective: 1000px;
        }

        /* card */
        .card {
            width: 500px;
            height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transition: all 1s;
    transform: perspective(1000px);
        }

        /* card front */
        .main-div section {
            width: 500px;
            height: 300px;
            background-color: #363658;
            border: 2px solid black;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            color: white;
            gap: 20px;
            position: absolute;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }

        .front {
            padding: 15px 20px 15px 50px;
        }

        .front>h2 {
            align-self: flex-end;
        }

        .front>p {
            font-size: 25px;
            letter-spacing: 5px;
        }

        /* valid date */
        .front>div {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 80px;
        }

        .valid {
            display: flex;
            justify-content: center;
            align-items: start;
            flex-direction: column;
            gap: 5px;
        }

        .valid p {
            color: #d8aa69;
            font-size: 15px;
        }

        .valid h2 {
            font-size: 25px;
        }

        /* back-card */
        .back {
            padding: 50px 0px;
            transform: rotateY(180deg);
        }

        .black {
            width: 100%;
            background-color: black;
            height: 50px;
        }

        .back>div {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back button:first-child {
            width: 50%;
            height: 35px;
            text-align: end;
            border: none;
            background-color: gray;
            border-radius: 5px;
            padding-right: 5px;
        }

        .back button:last-child {
            width: 10%;
            height: 30px;
            border: none;
            background-color: rgb(160, 155, 155);
        }


        /* form */
        form {
            width: 500px;
            height: 375px;
            background-color: #828f9b;
            border: 1px solid black;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        form>div {
            width: 100%;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: start;
            padding: 0px 20px 0px 20px;
            gap: 10px;
        }

        form label {
            font-size: 20px;
        }

        form input {
            width: 100%;
            height: 30px;
            outline: none;
            border-radius: 5px;
            border: none;
        }

        form>aside {
            width: 100%;
            height: 80px;
            display: flex;
            align-items: start;
            padding: 10px 20px 0px 20px;
            gap: 20px;
        }

        aside>div>input {
            padding: 10px;
        }
    </style>
</head>

<body>
    <!-- main-div -->
    <div class="main-div">
        <!-- card -->
        <div class="card" id="card">
            <!-- card-front -->
            <section class="front">
                <h2>Indian Overseas Bank</h2>
                <img src="./chip.png" alt="chip" width="55px" height="35px">
                <p id="cardNo">XXXX XXXX XXXX XXXX</p>
                <div>
                    <!-- valid date -->
                    <aside class="valid">
                        <p>VALID FROM</p>
                        <h2 id="fromDate">- / -</h2>
                    </aside>
                    <aside class="valid">
                        <p>VALID THRU</p>
                        <h2 id="endDate">- / -</h2>
                    </aside>
                </div>
                <h1 id="name">CARDHOLDER NAME</h1>
            </section>
            <!-- card-back -->
            <section class="back">
                <div class="black"></div>
                <div>
                    <button id="cvvNo">XXX</button>
                    <button>CVV</button>
                </div>
            </section>
        </div>

        <!-- details -->
        <form>
            <div>
                <label>Card Number</label>
                <input id="inpNo" oninput="show('Num')" />
            </div>
            <aside>
                <div>
                    <label>Valid From</label>
                    <input id="inpFrom" oninput="show('From')"/>
                </div>
                <div>
                    <label>Valid To</label>
                    <input id="inpTo" oninput="show('To')"/>
                </div>
            </aside>
            <div>
                <label>Card Holder Name</label>
                <input id="inpName" oninput="show('Name')" />
            </div>
            <div>
                <label>CVV NO:</label>
                <input id="inpCvv" oninput="show('Cvv')" onfocus="flip()" onblur="flip()"/>
            </div>
        </form>
    </div>
    <script src="./index.js"></script>
</body>

</html>
